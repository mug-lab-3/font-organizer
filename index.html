<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Local Font Organizer — 1ファイル版</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<style>
  :root {
    --bg:#0b0c10; --panel:#151821; --ink:#e8eaf0; --muted:#a7adbb; --accent:#65c3ff;
    --keep:#2ecc71; --drop:#ff6b6b; --chip:#222735;
  }
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;}
  header{background:linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,0));backdrop-filter: blur(6px);}
  .wrap{max-width:1200px;margin:0 auto;padding:16px;}
  .bar{display:grid;gap:10px;grid-template-columns: 1fr; }
  @media(min-width:900px){ .bar{grid-template-columns: 1fr; }}
  h1{margin:0 0 8px;font-size:20px;letter-spacing:.3px}
  .hint{color:var(--muted);font-size:12px;margin-top:4px}
  .panel{background:var(--panel);border-radius:16px;padding:14px;box-shadow: 0 8px 24px rgba(0,0,0,.25);}
  .controls{display:grid;gap:12px;grid-template-columns: 1fr;}
  @media(min-width:900px){ .controls{grid-template-columns: 200px 1fr;align-items:end;} }
  label.small{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  input[type="text"], select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #2a3040;background:#0f1320;color:var(--ink);outline:none;box-sizing:border-box}
  input[type="range"]{width:100%}
  .btn{appearance:none;border:1px solid #2a3040;border-radius:12px;padding:10px 14px;background:var(--chip);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn input{margin:0;}
  .btn select{margin:0;border:0;background:transparent;color:inherit;padding:0;width:auto;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  #reset{margin-left:auto}
  .list{margin-top:14px;display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:700px){ .list{grid-template-columns:1fr 1fr} }
  .card{background:#0e1120;border:1px solid #1f2740;border-radius:16px;padding:14px;display:grid;gap:10px}
  .meta{display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-size:12px;background:#12172a;border:1px solid #1e2540;padding:2px 8px;border-radius:999px;color:var(--muted)}
  .preview{min-height:48px;border-radius:10px;padding:12px;background:#0b0f1e;border:1px dashed #26304d;overflow-wrap:anywhere;word-break:break-word;box-sizing:border-box}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between}
  .status{display:flex;gap:8px}
  .status button{transition:background .15s,color .15s}
  .status .keep{border:1px solid var(--keep)}
  .status .drop{border:1px solid var(--drop)}
  .status .keep[aria-pressed="true"]{background:var(--keep);color:#0b0c10}
  .status .drop[aria-pressed="true"]{background:var(--drop);color:#0b0c10}
  .pill{padding:8px 14px;border-radius:12px;font-size:13px;cursor:pointer;user-select:none;background:var(--chip);color:var(--ink);border:1px solid #2a3040}
  .empty{padding:24px;text-align:center;color:var(--muted)}
  footer{padding:24px 16px;color:var(--muted);text-align:center}
  .accent{color:var(--accent)}
  .danger{color:#ff8b8b;display:inline-flex;align-items:center;gap:4px}
  .ok{color:#6ff7a8;display:inline-flex;align-items:center;gap:4px}
  details summary{cursor:pointer;opacity:.9}
  .flash-keep{animation:flashKeep .6s;}
  .flash-drop{animation:flashDrop .6s;}
  @keyframes flashKeep{from{background:rgba(46,204,113,.2);}to{background:#0e1120;}}
  @keyframes flashDrop{from{background:rgba(255,107,107,.2);}to{background:#0e1120;}}
  .sr{position:absolute;left:-9999px}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:20px;line-height:1}
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Local Font Organizer</h1>
      <div class="hint">Chrome / Edge など <code>Local Font Access</code> 対応ブラウザで利用できるフォント整理アプリです。最初に権限を許可してください。</div>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="bar">
        <div class="toolbar">
            <button id="load" class="btn"><span class="material-symbols-outlined" aria-hidden="true">search</span><span>ローカルフォントを読み込む</span></button>
            <button id="import" class="btn"><span class="material-symbols-outlined" aria-hidden="true">file_upload</span><span>インポート</span></button>
            <button id="export" class="btn"><span class="material-symbols-outlined" aria-hidden="true">download</span><span>必要なフォント一覧をダウンロード</span></button>
            <button id="reset" class="btn"><span class="material-symbols-outlined" aria-hidden="true">refresh</span><span>仕分けリセット</span></button>
          <input id="file" type="file" accept=".txt" class="sr" />
        </div>

        <div class="controls">
          <div>
            <label class="small">サイズ<span id="sizeLabel">32px</span></label>
            <input id="size" type="range" min="10" max="120" value="32" />
          </div>
          <div>
            <label class="small">プレビュー文字</label>
            <input id="sample" type="text" value="abcgxyz ABCJZ 0123 #$%!? あいう 亜伊宇" />
          </div>
          <div>
            <label class="small">表示モード</label>
            <select id="filter">
              <option value="all">すべて</option>
              <option value="undecided">未設定</option>
              <option value="keep">必要のみ</option>
              <option value="drop">不要のみ</option>
            </select>
          </div>
          <div>
            <label class="small">検索</label>
            <input id="q" type="text" placeholder="例: Noto, Yu Gothic, meiryo" />
          </div>
        </div>
      </div>

      <details style="margin-top:12px;">
        <summary>動作メモ</summary>
        <div class="hint">
          ・対応ブラウザで <b>local-fonts 権限</b> を許可すると一覧を取得できます。<br/>
          ・Firefox / Safari では列挙できないため、代替の案内を表示します。<br/>
          ・仕分け結果はローカルストレージに自動保存されます。
        </div>
      </details>

      <div id="status" class="hint" style="margin-top:10px;"></div>
      <div id="list" class="list" aria-live="polite"></div>
      <div id="end" class="empty"></div>
    </section>
  </main>

<script>
(() => {
  'use strict';

  // ---- State ---------------------------------------------------------------
  const state = {
    fonts: /** @type {Array<FontLike>} */([]),
    filtered: /** @type {Array<FontLike>} */([]),
    page: 0,
    pageSize: 80,
    decisions: loadDecisions(), // { key: 'keep'|'drop' }
    sampleText: 'The quick brown fox あいうえお 0123456789',
    sizePx: 32,
    filter: 'all',
    query: '',
    supported: {
      queryLocalFonts: 'queryLocalFonts' in window,
      navFontsQuery: !!(navigator.fonts && 'query' in navigator.fonts)
    }
  };

  // Key helpers
  function keyFor(face) {
    return `fam:${face.family}`;
  }
  function saveDecisions() {
    localStorage.setItem('font-organizer:v1', JSON.stringify(state.decisions));
  }
  function loadDecisions() {
    try { return JSON.parse(localStorage.getItem('font-organizer:v1') || '{}'); }
    catch { return {}; }
  }

  function savePrefs() {
    const prefs = {
      sampleText: state.sampleText,
      sizePx: state.sizePx,
      filter: state.filter,
      query: qEl.value
    };
    localStorage.setItem('font-organizer:prefs', JSON.stringify(prefs));
  }
  function loadPrefs() {
    try { return JSON.parse(localStorage.getItem('font-organizer:prefs') || '{}'); }
    catch { return {}; }
  }

  // ---- DOM elements --------------------------------------------------------
  const $ = (sel) => document.querySelector(sel);
  const listEl = $('#list');
  const statusEl = $('#status');
  const endEl = $('#end');
  const qEl = /** @type {HTMLInputElement} */($('#q'));
  const sampleEl = /** @type {HTMLInputElement} */($('#sample'));
  const sizeEl = /** @type {HTMLInputElement} */($('#size'));
  const sizeLabel = $('#sizeLabel');
  const filterEl = /** @type {HTMLSelectElement} */($('#filter'));
  const loadBtn = /** @type {HTMLButtonElement} */($('#load'));
  const exportBtn = /** @type {HTMLButtonElement} */($('#export'));
  const importBtn = /** @type {HTMLButtonElement} */($('#import'));
  const fileInput = /** @type {HTMLInputElement} */($('#file'));
  const resetBtn = /** @type {HTMLButtonElement} */($('#reset'));

  const prefs = loadPrefs();
  if (typeof prefs.sizePx === 'number') {
    state.sizePx = prefs.sizePx;
    sizeEl.value = String(state.sizePx);
    sizeLabel.textContent = `${state.sizePx}px`;
  }
  if (typeof prefs.sampleText === 'string') {
    state.sampleText = prefs.sampleText;
    sampleEl.value = prefs.sampleText;
  }
  if (typeof prefs.filter === 'string') {
    state.filter = prefs.filter;
    filterEl.value = prefs.filter;
  }
  if (typeof prefs.query === 'string') {
    qEl.value = prefs.query;
    state.query = prefs.query.trim().toLowerCase();
  }

  // ---- Types (JSDoc) -------------------------------------------------------
  /**
   * @typedef {{postscriptName?:string, fullName?:string, family:string, style?:string}} FontLike
   */

  // ---- UI wiring -----------------------------------------------------------
  qEl.addEventListener('input', () => { state.query = qEl.value.trim().toLowerCase(); applyFilterAndRender(true); savePrefs(); });
  sampleEl.addEventListener('input', () => { state.sampleText = sampleEl.value; refreshSamples(); savePrefs(); });
  sizeEl.addEventListener('input', () => { state.sizePx = +sizeEl.value; sizeLabel.textContent = `${state.sizePx}px`; refreshSamples(); savePrefs(); });
  filterEl.addEventListener('change', () => { state.filter = filterEl.value; applyFilterAndRender(true); savePrefs(); });

    resetBtn.addEventListener('click', () => {
      if (!confirm('仕分け結果をすべてリセットしますか？')) return;
    state.decisions = {};
    saveDecisions();
    applyFilterAndRender(false);
  });

  importBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    const text = await file.text();
    const names = new Set(text.split(/\r?\n/).map(s => s.trim()).filter(Boolean));
    let matched = 0;
    for (const f of state.fonts) {
      const kFam = `fam:${f.family}`;
      if (names.has(f.family) || names.has(f.postscriptName) || names.has(f.fullName)) {
        state.decisions[kFam] = 'keep';
        matched++;
      }
    }
      saveDecisions();
      alert(`読み込み完了: ${matched} 件を「必要」に設定しました`);
    applyFilterAndRender(false);
    fileInput.value = '';
  });

  exportBtn.addEventListener('click', () => {
    const keepSet = new Set();
    for (const f of state.fonts) {
      const kFam = `fam:${f.family}`;
      const kPS = `ps:${f.postscriptName || f.fullName || f.family}`;
      const kept = state.decisions[kFam] === 'keep' || state.decisions[kPS] === 'keep';
      if (kept) keepSet.add(f.family);
    }
    const lines = Array.from(keepSet).sort((a,b)=>a.localeCompare(b,'ja'));
    const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-');
    a.download = `kept-fonts_${ts}.txt`;
    a.href = URL.createObjectURL(blob);
    a.click();
    URL.revokeObjectURL(a.href);
  });

  loadBtn.addEventListener('click', async () => {
    await loadFonts();
  });

  // ---- Data loading --------------------------------------------------------
  async function loadFonts() {
    listEl.innerHTML = '';
    endEl.textContent = '';
      status('ローカルフォントの列挙を開始します…');

    // Try permission hint (optional)
    try {
      if (navigator.permissions) {
        // Not all UAs implement this name, so ignore errors
        // @ts-ignore
        const p = await navigator.permissions.query({name:'local-fonts'});
        if (p && p.state === 'denied') {
            status('権限が拒否されています。アドレスバー左のアイコンから許可してください。', true);
        }
      }
    } catch {}

    /** @type {Array<FontLike>} */
    let fonts = [];
    try {
      if ('queryLocalFonts' in window) {
        // @ts-ignore
        fonts = await window.queryLocalFonts();
      } else if (navigator.fonts && 'query' in navigator.fonts) {
        // @ts-ignore older API returns async iterator
        for await (const md of navigator.fonts.query()) {
          fonts.push(md);
        }
      } else {
        unsupportedMessage();
        return;
      }
    } catch (e) {
        console.error(e);
        status('権限が許可されなかったか、ポリシーでブロックされています。Chromeの設定を確認してください。', true);
      return;
    }

    // Normalize & sort
    state.fonts = fonts
      .map(f => ({ family: f.family, fullName: f.fullName || '', postscriptName: f.postscriptName || '', style: f.style || '' }))
      .sort((a,b)=> a.family.localeCompare(b.family,'ja') || (a.fullName||'').localeCompare(b.fullName||'','ja'));
    const familyCount = new Set(state.fonts.map(f => f.family)).size;
    status(`読み込み完了: ${familyCount} フォントファミリを取得しました`);
    applyFilterAndRender(true);
  }

  function unsupportedMessage() {
    statusEl.innerHTML = '';
    listEl.innerHTML = `
      <div class="empty">
          <div class="danger">このブラウザではインストールフォントの列挙ができません。</div>
          <div class="hint" style="margin-top:8px">
            Chrome または Microsoft Edge の最新バージョンで開き、<br/>
            「ローカルフォントへのアクセス」を許可してください。
          </div>
      </div>`;
  }

  // ---- Filtering & grouping ------------------------------------------------
  function applyFilterAndRender(resetPage) {
    if (resetPage) state.page = 0;

    let arr = state.fonts;

    // Group by family (choose representative face)
    {
      const map = new Map();
      for (const f of arr) {
        if (!map.has(f.family)) map.set(f.family, f);
        // Prefer "Regular" if available
        const chosen = map.get(f.family);
        if (f.style && /regular/i.test(f.style)) map.set(f.family, f);
        else if (!chosen) map.set(f.family, f);
      }
      arr = Array.from(map.values());
    }

    // Text query
    if (state.query) {
      const q = state.query;
      arr = arr.filter(f =>
        (f.family && f.family.toLowerCase().includes(q)) ||
        (f.fullName && f.fullName.toLowerCase().includes(q)) ||
        (f.postscriptName && f.postscriptName.toLowerCase().includes(q))
      );
    }

    // Status filter
    const filtered = arr.filter(f => {
      const k = keyFor(f);
      const d = state.decisions[k];
      if (state.filter === 'keep') return d === 'keep';
      if (state.filter === 'drop') return d === 'drop';
      if (state.filter === 'undecided') return d !== 'keep' && d !== 'drop';
      return true;
    });

    state.filtered = filtered;
    renderPage(true);
  }

  // ---- Rendering -----------------------------------------------------------
  let io = null;
  let previewObserver = null;
  const visiblePreviews = new Set();

  function renderPage(reset) {
    if (reset) {
      listEl.innerHTML = '';
      visiblePreviews.clear();
      if (previewObserver) previewObserver.disconnect();
    }
    if (!state.filtered.length) {
        endEl.textContent = '該当する項目はありません。';
      return;
    } else {
      endEl.textContent = '';
    }
    const start = state.page * state.pageSize;
    const end = Math.min(start + state.pageSize, state.filtered.length);
    const frag = document.createDocumentFragment();
    const cards = [];

    for (let i = start; i < end; i++) {
      const card = renderCard(state.filtered[i]);
      frag.appendChild(card);
      cards.push(card);
    }
    listEl.appendChild(frag);

    if (!previewObserver) {
      previewObserver = new IntersectionObserver(handlePreviewIntersect, {rootMargin: '200px 0px'});
    }
    for (const c of cards) {
      const p = c.querySelector('.preview');
      if (p) previewObserver.observe(p);
    }

    if (io) io.disconnect();
    io = new IntersectionObserver(entries => {
      if (entries.some(e => e.isIntersecting)) {
        io.disconnect();
        if ((state.page + 1) * state.pageSize < state.filtered.length) {
          state.page++;
          renderPage(false);
        } else {
            endEl.textContent = 'これ以上ありません。';
        }
      }
    }, {rootMargin: '800px 0px'});
    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    listEl.appendChild(sentinel);
    io.observe(sentinel);

    refreshSamples();
  }

  function handlePreviewIntersect(entries) {
    for (const e of entries) {
      const el = /** @type {HTMLDivElement} */ (e.target);
      if (e.isIntersecting) {
        visiblePreviews.add(el);
        renderPreview(el);
      } else {
        visiblePreviews.delete(el);
      }
    }
  }

  function renderCard(face) {
    const k = keyFor(face);
    const d = state.decisions[k]; // 'keep' | 'drop' | undefined
    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'row';
    title.innerHTML = `
      <div>
        <strong>${escapeHtml(face.family)}</strong>
      </div>
      <div class="status">
          <button class="pill keep" aria-pressed="${d==='keep'}">必要</button>
          <button class="pill drop" aria-pressed="${d==='drop'}">不要</button>
      </div>
    `;
    const preview = document.createElement('div');
    preview.className = 'preview';
    preview.dataset.family = face.family;
    preview.dataset.full = face.fullName || '';
    preview.dataset.ps = face.postscriptName || '';
    preview.textContent = '';

    // Button handlers
    const [keepBtn, dropBtn] = title.querySelectorAll('button');
    function afterDecision() {
      if (state.filter !== 'all') {
        const d = state.decisions[k];
        const match = (state.filter === 'keep' && d === 'keep') ||
          (state.filter === 'drop' && d === 'drop') ||
          (state.filter === 'undecided' && d !== 'keep' && d !== 'drop');
        if (!match) applyFilterAndRender(true);
      }
    }
    keepBtn.addEventListener('click', () => {
      state.decisions[k] = 'keep';
      saveDecisions();
      keepBtn.setAttribute('aria-pressed', 'true');
      dropBtn.setAttribute('aria-pressed', 'false');
        status(`${face.family} を必要に設定しました`);
      card.classList.remove('flash-drop');
      card.classList.add('flash-keep');
      setTimeout(() => { card.classList.remove('flash-keep'); afterDecision(); }, 200);
    });
    dropBtn.addEventListener('click', () => {
      state.decisions[k] = 'drop';
      saveDecisions();
      keepBtn.setAttribute('aria-pressed', 'false');
      dropBtn.setAttribute('aria-pressed', 'true');
        status(`${face.family} を不要に設定しました`);
      card.classList.remove('flash-keep');
      card.classList.add('flash-drop');
      setTimeout(() => { card.classList.remove('flash-drop'); afterDecision(); }, 200);
    });

    if (d === 'keep') keepBtn.setAttribute('aria-pressed', 'true');
    if (d === 'drop') dropBtn.setAttribute('aria-pressed', 'true');

    card.appendChild(title);
    card.appendChild(preview);
    return card;
  }

  function refreshSamples() {
    visiblePreviews.forEach(el => renderPreview(el));
  }

  function renderPreview(el) {
    const fam = el.dataset.family || '';
    const full = el.dataset.full || '';
    const ps = el.dataset.ps || '';
    // Try to strongly prefer the specific face via @font-face local()
    const alias = `__LFA_${(ps || full || fam).replace(/[^a-z0-9_-]/gi,'_')}`;
    ensureLocalFace(alias, ps, full, fam);
    el.style.fontFamily = `"${alias}", "${full}", "${fam}"`;
    el.style.fontSize = state.sizePx + 'px';
    el.textContent = state.sampleText;
  }

  const injected = new Set();
  function ensureLocalFace(alias, ps, full, fam) {
    if (injected.has(alias)) return;
    const css = `
      @font-face {
        font-family: "${alias}";
        src: local("${escapeCss(ps)}"), local("${escapeCss(full)}"), local("${escapeCss(fam)}");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
    `;
    const style = document.createElement('style');
    style.textContent = css;
    document.head.appendChild(style);
    injected.add(alias);
  }

  function status(msg, isErr=false) {
    statusEl.innerHTML = isErr
      ? `<span class="danger"><span class="material-symbols-outlined" aria-hidden="true">warning</span><span>${escapeHtml(msg)}</span></span>`
      : `<span class="ok"><span class="material-symbols-outlined" aria-hidden="true">check_circle</span><span>${escapeHtml(msg)}</span></span>`;
  }

  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
  function escapeCss(s){ return (s||'').replace(/["\\]/g, m=>`\\${m}`); }

  // 初回、ブラウザ対応を案内
  (function initBanner(){
    if (!state.supported.queryLocalFonts && !state.supported.navFontsQuery) {
      unsupportedMessage();
    } else {
        status('準備が整いました。左上の「ローカルフォントを読み込む」を選択してください。');
    }
  })();
})();
</script>
</body>
</html>
